<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>스코어시스템 세로형 04 연습그린</title>

  <!-- D: 개발자 확인용 코멘트 -->
  <!-- D: 세로형 버전 style 파일 -->
  <link rel="stylesheet" href="./../assets/css/base.css">
  <link rel="stylesheet" href="./../assets/css/page-vertical.css">
  <!-- // D: 세로형 버전 style 파일 -->

</head>

<body data-layout="vertical">

  <!-- D: wrapper-vertical : 세로형 버전 -->
  <div class="wrapper-vertical">
    <!-- D: .inner02: 피그마 기준 04_연습그린 디자인 -->
    <div class="inner inner02">

      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo-main-DB.png" alt="DB손해보험 프로미오픈" class="logo-header">
        </h1>
      </header>

      <!-- D: .main-green: 피그마 기준 04_연습그린 디자인 -->
      <main class="main main-green">
        
        <!-- data-inner: 피그마 기준 04_연습그린 디자인 -->
        <div class="inner data-inner">
          <div class="data-time">
            00:00:00
          </div>

          <!-- data-box03 -->
          <div class="data-box data-box03">
            <ul class="title">
              <li>GREEN SPEED</li>
            </ul>

            <!-- D: .sub-data -->
            <div class="sub-data">
              <ul class="sub-title">
                <li>연습그린</li>
                <li>코스그린</li>
              </ul>
              <ul class="data">
                <!-- D: 숫자 출력 영역은 관리자 폰트 색상 지정에 따라 변동 -->
                <li class="s-color">0.00</li>
                <li class="s-color">0.00</li>
              </ul>
            </div>
          </div>
          <!-- // data-box03 -->

          <!-- D: .data-single -->
          <div class="data-box data-single">
            <ul class="title">
              <li>그린 경도</li>
            </ul>
            <ul class="data">
              <li class="s-color">0.00</li>
            </ul>
          </div>

          <!-- D: .data-single -->
          <div class="data-box data-single">
            <ul class="title">
              <li>그린 습도</li>
            </ul>
            <ul class="data">
              <li class="s-color">0.00</li>
            </ul>
          </div>
        </div>
        <!-- // data-inner -->

      </main>

    </div>
    <!-- //inner02 -->
  </div>

</body>
</html>
