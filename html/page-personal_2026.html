<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Document</title>
  <link rel="stylesheet" href="./../assets/css/base.css">
  <!-- (공통)2026-03-29 가로버전.css 분리 -->
  <link rel="stylesheet" href="./../assets/css/page-horizontal.css">
  <!-- //2026-03-29 가로버전.css 분리 -->
</head>


<body data-layout="horizontal">

  <div class="wrapper">
    <!-- section-personal: 2026-05-19 -->
    <section class="container-section section-personal">
      
      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo_header02-cell.svg" alt="CELLTrion Queens Masters" class="logo-header">
        </h1>
        <div class="sub-title">FINAL ROUND</div>
      </header>

      <!-- main.main-personal -->
      <main class="main main-personal">
        <div class="inner">

          <div class="personal-wrap">

            <div class="info-area">

              <div class="name-box">
                <!-- 2026-05-19 : p tag -->
                <p class="name">임희정</p>
                <span class="name-en">LIM Heejeong</span>
              </div>

              <ul class="data-area style-row big">
                <li>
                  <span class="name">POS</span>
                  <span class="data">1</span>
                </li>
                <li>
                  <span class="name">SCORE</span>
                  <span class="data red">-18</span>
                </li>
              </ul>

              <div class="scoreboard-wrap">
                <table class="scoreboard">
                  <thead>
                    <tr class="hole-row">
                      <th class="main-th">HOLE</th>
                      <th>1</th>
                      <th>2</th>
                      <th>3</th>
                      <th>4</th>
                      <th>5</th>
                      <th>6</th>
                      <th>7</th>
                      <th>8</th>
                      <th>9</th>
                      <th class="out">OUT</th>
                      <th>10</th>
                      <th>11</th>
                      <th>12</th>
                      <th>13</th>
                      <th>14</th>
                      <th>15</th>
                      <th>16</th>
                      <th>17</th>
                      <th>18</th>
                      <th class="in">IN</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr class="par-row">
                      <th class="main-th">PAR</th>
                      <td>5</td>
                      <td>4</td>
                      <td>4</td>
                      <td>3</td>
                      <td>4</td>
                      <td>4</td>
                      <td>4</td>
                      <td>3</td>
                      <td>5</td>
                      <td class="out">36</td>
                      <td>5</td>
                      <td>4</td>
                      <td>4</td>
                      <td>3</td>
                      <td>4</td>
                      <td>4</td>
                      <td>4</td>
                      <td>3</td>
                      <td>5</td>
                      <td class="in">36</td>
                    </tr>

                    <tr class="player-row">
                      <th class="main-th">임희정</th>
                      <td>5</td>
                      <td>4</td>
                      <td>4</td>
                      <td>3</td>
                      <td>4</td>
                      <td>4</td>
                      <td class="score-under">3</td>
                      <td>3</td>
                      <td>5</td>
                      <td class="out total-red">35</td>

                      <td>5</td>
                      <td>4</td>
                      <td class="score-over">5</td>
                      <td>3</td>
                      <td>4</td>
                      <td>4</td>
                      <td>4</td>
                      <td>3</td>
                      <td>5</td>
                      <td class="in total-blue">37</td>
                    </tr>
                  </tbody>
                </table>
              </div>

            </div>

          </div>

        </div>
      </main>
      <!--// main.main-personal -->

      <footer>
        <div class="footer-logo">
          <img src="../assets/images/logo_footer.svg" alt="DB손해보험" class="logo-footer">
        </div>
      </footer>

    </section>
  </div>

</body>

</html>
