<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Document</title>
  <link rel="stylesheet" href="./../assets/css/base.css">
  <!-- (공통)2026-03-29 가로버전.css 분리 -->
  <link rel="stylesheet" href="./../assets/css/page-horizontal.css">
  <!-- //2026-03-29 가로버전.css 분리 -->
</head>


<body data-layout="horizontal">

  <div class="wrapper">
    <!-- section-personal: 2026-05-19 -->
    <section class="container-section section-personal">
      
      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo_header02-cell.svg" alt="CELLTrion Queens Masters" class="logo-header">
        </h1>
        <div class="sub-title">FINAL ROUND</div>
      </header>

      <!-- main.main-personal -->
      <!-- 2026-05-19 -->
      <main class="main main-personal">
        <div class="personal-wrap">

          <!-- info-area -->
          <div class="info-area">

            <div class="name-box">
              <!-- 2026-05-19 : p tag -->
              <p class="name">임희정</p>
              <span class="name-en">LIM Heejeong</span>
            </div>

            <ul class="data-area style-row big">
              <li>
                <span class="name">POS</span>
                <span class="data">1</span>
              </li>
              <li>
                <span class="name">SCORE</span>
                <span class="data red">-18</span>
              </li>
            </ul>

            <div class="scoreboard-wrap">
              <table class="scoreboard">
                <thead>
                  <tr class="hole-row">
                    <th class="main-th">HOLE</th>
                    <!-- srart: 2026-05-31 숫자 간격 -->
                    <th class="number">1</th>
                    <th class="number">2</th>
                    <th class="number">3</th>
                    <th class="number">4</th>
                    <th class="number">5</th>
                    <th class="number">6</th>
                    <th class="number">7</th>
                    <th class="number">8</th>
                    <th class="number">9</th>
                    <th class="out">OUT</th>
                    <th class="number">10</th>
                    <th class="number">11</th>
                    <th class="number">12</th>
                    <th class="number">13</th>
                    <th class="number">14</th>
                    <th class="number">15</th>
                    <th class="number">16</th>
                    <th class="number">17</th>
                    <th class="number">18</th>
                    <!-- end: 2026-05-31 숫자 간격 -->
                    <th class="in">IN</th>
                  </tr>
                </thead>
                <tbody>
                  <tr class="par-row">
                    <th class="main-th">PAR</th>
                    <!-- srart: 2026-05-31 숫자 간격 -->
                    <td class="number">5</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">3</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">3</td>
                    <td class="number">5</td>
                    <td class="out">36</td>
                    <td class="number">5</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">3</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">3</td>
                    <td class="number">5</td>
                    <!-- end: 2026-05-31 숫자 간격 -->
                    <td class="in">36</td>
                  </tr>

                  <tr class="player-row">
                    <th class="main-th">임희정</th>
                    <!-- srart: 2026-05-31 숫자 간격 -->
                    <td class="number">5</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">3</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="score-under">3</td>
                    <td class="number">3</td>
                    <td class="number">5</td>
                    <td class="out total-red">35</td>
                    <td class="number">5</td>
                    <td class="number">4</td>
                    <td class="score-over">5</td>
                    <td class="number">3</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">4</td>
                    <td class="number">3</td>
                    <td class="number">5</td>
                    <!-- end: 2026-05-31 숫자 간격 -->
                    <td class="in total-blue">37</td>
                  </tr>
                </tbody>
              </table>
            </div>

          </div>
          <!-- // info-area -->

        </div>
      </main>
      <!--// main.main-personal -->

    </section>
  </div>

</body>

</html>
