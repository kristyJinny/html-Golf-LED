<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Document</title>
  <link rel="stylesheet" href="./../assets/css/base.css">
  <!-- (공통)2026-03-29 가로버전.css 분리 -->
  <link rel="stylesheet" href="./../assets/css/page-horizontal.css">
  <!-- //2026-03-29 가로버전.css 분리 -->
</head>

<!-- (공통) 2026-03-29 가로버전 : data-layout="horizontal 추가-->
<body data-layout="horizontal">

  <div class="wrapper">
    <section class="container-section" data-page="page-card">
      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo_header.svg" alt="20회 DB손해보험" class="logo-header">
        </h1>
        <div class="sub-title">1 ROUND</div>
      </header>

      <main class="main main-card">
        <div class="inner">

          <div class="card-list">
            <div class="card-item">
              <div class="profile-area">
                <div class="img-box">
                  <img src="../assets/images/img_profile_card_01.png" alt="" class="card-img">
                </div>
                <div class="name-box">
                  <span class="name">빳차라쭈타 콩끄라판(I)</span>
                  <span class="name-en">Patcharajutar Kongkraphan</span>
                </div>
              </div>
              <ul class="data-area medium">
                <li>
                  <span class="name">POS</span>
                  <span class="data">1</span>
                </li>
                <li>
                  <span class="name">SCORE</span>
                  <span class="data red">-18</span>
                </li>
                <li>
                  <span class="name">TODAY</span>
                  <span class="data red">-7</span>
                </li>
              </ul>
            </div>

            <div class="card-item">
              <div class="profile-area">
                <div class="img-box">
                  <img src="../assets/images/img_profile_card_03.png" alt="" class="card-img">
                </div>
                <div class="name-box">
                  <span class="name">박상현</span>
                  <span class="name-en">SANGHYUN PARK</span>
                </div>
              </div>
              <ul class="data-area medium">
                <li>
                  <span class="name">POS</span>
                  <span class="data">1</span>
                </li>
                <li>
                  <span class="name">SCORE</span>
                  <span class="data red">-18</span>
                </li>
                <li>
                  <span class="name">TODAY</span>
                  <span class="data red">-7</span>
                </li>
              </ul>
            </div>

            <div class="card-item">
              <div class="profile-area">
                <div class="img-box">
                  <img src="../assets/images/img_profile_card_02.png" alt="" class="card-img">
                </div>
                <div class="name-box">
                  <span class="name">이정환</span>
                  <span class="name-en">JUNGWHAN LEE</span>
                </div>
              </div>
              <ul class="data-area medium">
                <li>
                  <span class="name">POS</span>
                  <span class="data">1</span>
                </li>
                <li>
                  <span class="name">SCORE</span>
                  <span class="data red">-18</span>
                </li>
                <li>
                  <span class="name">TODAY</span>
                  <span class="data red">-7</span>
                </li>
              </ul>
            </div>
          </div>

        </div>
      </main>

      <footer>
        <div class="footer-logo">
          <img src="../assets/images/logo_footer.svg" alt="DB손해보험" class="logo-footer">
        </div>
      </footer>
    </section>
  </div>

  <script>
    // 2026-03-29: 3글자 초과이면 .name 에 .name-long 클래스 추가
    // 이름이 긴 경우 폰트 사이즈 조정 (최대 이름 : 빳차라쭈타 콩끄라판(I) - 17자)
    document.querySelectorAll('.name').forEach(el => {
      const text = el.textContent.trim();
    
      if (text.length > 3) {
        el.classList.add('name-long');
      }
    });
    </script>
</body>

</html>
