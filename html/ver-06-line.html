<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>스코어시스템 세로형 05 상세안내02</title>

  <!-- D: 개발자 확인용 코멘트 -->
  <!-- D: 세로형 버전 style 파일 -->
  <link rel="stylesheet" href="./../assets/css/base.css">
  <link rel="stylesheet" href="./../assets/css/page-vertical.css">
  <!-- // D: 세로형 버전 style 파일 -->

</head>

<body data-layout="vertical">

  <!-- D: wrapper-vertical : 세로형 버전, 관리자 화면으로 배경 이미지 넣기 -->
  <div class="wrapper-vertical" style="background-image:url('../assets/images/bg_green.png')">
    <!-- D: .inner-table: 피그마 기준 05_상세안내02 디자인 -->
    <div class="inner inner-table">

      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo-main-DB.png" alt="DB손해보험 프로미오픈" class="logo-header">
        </h1>
      </header>

      <main class="main">
        
        <!-- data-inner: 피그마 기준 05_상세안내02 디자인 -->
        <div class="inner data-inner">
          <p class="round">1 ROUND</p>

          <!-- data-table -->
          <div class="data-table">
            <ul class="title">
              <li>POS</li>
              <li>PLAYER</li>
              <li>SCORE</li>
              <li>HOLE</li>
              <li>TODAY</li>
            </ul>

            <!-- data-area -->
            <ul class="data-area data-row05"> <!--.data-row05 추가: 2026-03-22: 폰트 사이즈 크기 확대 -->
              <li class="line"><!-- .data-line 추가: 2026-04-06 -->
                <span class="index">1</span>
                <!-- 2026-03-29 -->
                <span class="name name-over">오수민 <span class="small-name">0809(A)</span></span>
                <!-- //2026-03-27 -->
                <span class="score-bg red">-18</span>
                <span>4</span>
                <span class="red">-7</span>
              </li>
              <li>
                <span class="index">2</span>
                <span class="name">빳차라쭈타 콩끄라판(I)</span>  <!-- 2026-03-29 -->
                <span class="score-bg">-14</span>
                <span>4</span>
                <span class="red">-2</span>
              </li>
              <li class="line"><!-- .data-line 추가: 2026-04-06 -->
                <span class="index">3</span>
                <span class="name">이정환</span>
                <span class="score-bg red">-13</span>
                <span>5</span>
                <span class="red">-6</span>
              </li>
              <li>
                <span class="index">4</span>
                <span class="name">윤상필</span>
                <span class="score-bg red">-18</span>
                <span>4</span>
                <span class="red">-7</span>
              </li>
              <li>
                <span class="index">T5</span>
                <span class="name">김비오</span>
                <span class="score-bg">0</span>
                <span>8</span>
                <span>0</span>
              </li>
            </ul>
            <!-- // data-area -->

          </div>
          <!-- // data-table -->

        </div>
        <!-- // data-inner -->

      </main>

    </div>
    <!-- //inner-table -->
  </div>
  <!-- // wrapper-vertical -->

  <script>
    // 2026-03-29: 3글자 초과이면 .name 에 .name-long 클래스 추가
    // 이름이 긴 경우 폰트 사이즈 조정 (최대 이름 : 빳차라쭈타 콩끄라판(I) - 17자)
    document.querySelectorAll('.name').forEach(el => {
      const text = el.textContent.trim();
    
      if (text.length > 3) {
        el.classList.add('name-long');
      }
    });
    </script>
</body>
</html>
