<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Document</title>
  <link rel="stylesheet" href="./../assets/css/base.css">
  <!-- (공통)2026-03-29 가로버전.css 분리 -->
  <link rel="stylesheet" href="./../assets/css/page-horizontal.css">
  <!-- //2026-03-29 가로버전.css 분리 -->

  <style>
    body {background-color: black;} /* 퍼블 확인용: */
  </style>
</head>

<!-- (공통) 2026-03-29 가로버전 : data-layout="horizontal 추가-->
<body data-layout="horizontal">

  <div class="wrapper">
    <!-- D: 2026-03-27 container-page-event 추가 -->
    <section class="container-section container-page-event">
      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo_header.svg" alt="20회 DB손해보험" class="logo-header">
        </h1>
        <!-- <div class="sub-title">1 ROUND</div> -->
      </header>

      <main class="main main-event">
        <div class="inner">

          <!-- <div class="img-box">
            <img src="../assets/images/bg_01.png" alt="" class="test-img">
          </div> -->

        </div>
      </main>

      <footer class="footer-event">
        <div class="inner">
          <div class="title-box">
            <span class="footer-title">ROUND 1</span>
            <div class="name-area">

              <!-- 2026-04-01 -->
              <div class="title-area">
                <span class="title">T106</span> <!-- 2026-04-21: 최대 4자 기준-->
                <!-- <span class="title">T1</span> -->
              </div>
              <!-- /// 2026-04-01 -->

              <div class="name-box">
                <span class="name">빳차라쭈타 콩끄라판(I)</span>
                <!-- <span class="name-en">Patcharajutar Kongkraphan</span> 영문 삭제 -->
                <!-- <span class="name name-over">오수민 <span class="small-name">0809(A)</span></span> -->
                <!-- <span class="name-en">SANGPIL YOON</span> -->
              </div>
            </div>
          </div>
          <ul class="data-area small">
            <li>
              <span class="name">TOTAL</span>
              <span class="data">1</span>
            </li>
            <li>
              <span class="name">TODAY</span>
              <span class="data red">-18</span>
            </li>
            <li>
              <span class="name">HOLE</span>
              <span class="data red">-7</span>
            </li>
          </ul>
        </div>
      </footer>
    </section>
  </div>

 
  <script>
    // 2026-03-29: 3글자 초과이면 .name 에 .name-long 클래스 추가
    // 이름이 긴 경우 폰트 사이즈 조정 (최대 이름 : 빳차라쭈타 콩끄라판(I) - 17자)
    document.querySelectorAll('.name').forEach(el => {
      const text = el.textContent.trim();
    
      if (text.length > 3) {
        el.classList.add('name-long');
      }
    });
    </script>
</body>

</html>
