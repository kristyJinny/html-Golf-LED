<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>스코어시스템 세로형 03 상세안내</title>

  <!-- D: 개발자 확인용 코멘트 -->
  <!-- D: 세로형 버전 style 파일 -->
  <link rel="stylesheet" href="./../assets/css/base.css">
  <link rel="stylesheet" href="./../assets/css/page-vertical.css">
  <!-- // D: 세로형 버전 style 파일 -->

</head>

<body data-layout="vertical">

  <!-- D: wrapper-vertical : 세로형 버전 -->
  <div class="wrapper-vertical">
    <!-- D: .inner02: 피그마 기준 03_상세안내 디자인 -->
    <div class="inner inner02">

      <header class="header">
        <h1 class="main-title">
          <img src="../assets/images/logo-main-DB.png" alt="DB손해보험 프로미오픈" class="logo-header">
        </h1>
      </header>

      <main class="main">
        
        <!-- data-inner: 피그마 기준 03_상세안내 디자인 -->
        <div class="inner data-inner">
          <p class="round">1 ROUND</p>
          <div class="data-time">
            00:00:00
          </div>

          <!-- data-box01 -->
          <div class="data-box data-box01">
            <ul class="title">
              <li>GROUP</li>
              <li>TEE-OFF</li>
            </ul>

            <ul class="data">
              <li>1</li>
              <li>10:00</li>
            </ul>
          </div>

          <!-- data-box02 -->
          <div class="data-box data-box02">
            <ul class="title">
              <li>PLAYER</li>
              <li>SCORE</li>
            </ul>

            <ul class="data02">
              <li>
                <span class="name">빳차라쭈타 콩끄라판(I)</span> <!-- 2026-03-29 -->
                <span class="score">-18</span>
              </li>
              <li>
                <span class="name">박상현</span>
                <span class="score">-14</span>
              </li>
              <li>
                <span class="name">이정환</span>
                <span class="score">-13</span>
              </li>
            </ul>
          </div>
        </div>
        <!-- // data-inner -->

      </main>

    </div>
    <!-- //inner02 -->
  </div>
  
  <script>
    // 2026-03-29: 3글자 초과이면 .name 에 .name-long 클래스 추가
    // 이름이 긴 경우 폰트 사이즈 조정 (최대 이름 : 빳차라쭈타 콩끄라판(I) - 17자)
    document.querySelectorAll('.name').forEach(el => {
      const text = el.textContent.trim();
    
      if (text.length > 3) {
        el.classList.add('name-long');
      }
    });
    </script>
</body>
</html>
